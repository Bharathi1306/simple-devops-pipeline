apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-app
  template:
    metadata:
      labels:
        app: ecom-app
    spec:
      containers:
      - name: ecom-app
        image: bharathi136/ecom-app:latest
        ports:
        - containerPort: 3000
